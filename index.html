<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Barijera PWA Simulator</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root { --bg:#0b1220; --panel:#111827; --muted:#94a3b8; --text:#e5e7eb; --accent:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#020617,#0f172a);color:var(--text)}
    .wrap{max-width:760px;margin:0 auto;padding:20px}
    .card{background:rgba(17,24,39,.9);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    h1{font-size:1.25rem;margin:0 0 8px} p{color:var(--muted);line-height:1.45}
    .grid{display:grid;gap:12px}.grid2{grid-template-columns:1fr 1fr}
    @media (max-width:700px){.grid2{grid-template-columns:1fr}}
    label{display:block;font-size:.9rem;color:var(--muted);margin-bottom:6px}
    input,select,button{width:100%;border-radius:12px;border:1px solid rgba(148,163,184,.25);background:#0b1220;color:var(--text);padding:12px 14px;font-size:1rem}
    button{cursor:pointer}
    .main-btn{font-size:1.25rem;font-weight:700;padding:18px}
    .state{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#0b1220;border:1px solid rgba(148,163,184,.2);font-weight:600}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1}
    .log{background:#020617;border-radius:12px;padding:12px;min-height:180px;max-height:280px;overflow:auto;font-family:ui-monospace,Consolas,monospace;font-size:.9rem;white-space:pre-wrap}
    .accent{color:var(--accent)} .warn{color:var(--warn)} .danger{color:var(--danger)}
    .small{font-size:.85rem;color:var(--muted)}
  </style>
</head>
<body>
<div class="wrap grid" style="gap:16px">
  <div class="card">
    <h1>Barijera PWA simulator</h1>
    <p>Početno stanje je <strong>CLOSED</strong>. Klik na glavnu tipku šalje MQTT komandu, simulira impuls od 1 s na paru releja, a nakon 10 s mijenja stanje tipke.</p>
    <div class="row" style="align-items:center">
      <div class="state" id="stateBadge"><span class="dot" id="stateDot"></span><span id="stateText">CLOSED</span></div>
      <div class="small" id="connText">MQTT: nije spojeno</div>
    </div>
  </div>

  <div class="card grid grid2">
    <div>
      <label for="wsUrl">MQTT WebSocket URL</label>
      <input id="wsUrl" value="wss://xf131e86.ala.eu-central-1.emqxsl.com:8084/mqtt" />
    </div>
    <div>
      <label for="topic">Topic komande</label>
      <input id="topic" value="barijera/komanda" />
    </div>
    <div>
      <label for="user">Korisničko ime</label>
      <input id="user" value="esp32" />
    </div>
    <div>
      <label for="pass">Lozinka</label>
      <input id="pass" type="password" value="esp32pass" />
    </div>
    <div class="row" style="grid-column:1 / -1">
      <button id="connectBtn">Spoji MQTT</button>
      <button id="disconnectBtn">Prekini vezu</button>
    </div>
  </div>

  <div class="card grid">
    <button class="main-btn" id="mainBtn">OTVORI</button>
    <div class="row">
      <button id="toggleBtn">TOGGLE</button>
      <button id="resetBtn">RESET_FAULT</button>
    </div>
    <div class="small">Simulacija releja: <span id="relayText">mirovanje</span></div>
  </div>

  <div class="card">
    <div class="log" id="log"></div>
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
(() => {
  const els = id => document.getElementById(id);
  const state = {
    barrier: 'CLOSED',
    moving: false,
    client: null,
    topic: 'barijera/komanda',
    timer: null,
    pulseTimer: null,
  };

  const log = (msg, cls='') => {
    const line = `[${new Date().toLocaleTimeString('hr-HR')}] ${msg}`;
    const div = document.createElement('div');
    if (cls) div.className = cls;
    div.textContent = line;
    els('log').prepend(div);
  };

  const render = () => {
    const st = state.barrier;
    els('stateText').textContent = st;
    els('stateDot').style.background = st === 'OPEN' ? '#22c55e' : st === 'CLOSED' ? '#94a3b8' : '#f59e0b';
    els('mainBtn').disabled = state.moving;
    els('mainBtn').textContent = st === 'CLOSED' ? 'OTVORI' : st === 'OPEN' ? 'ZATVORI' : 'U TIJEKU…';
    els('relayText').textContent = state.moving
      ? (state.target === 'OPEN' ? 'impuls RELAY_DOWN_1 + RELAY_DOWN_2 (1 s)' : 'impuls RELAY_UP_1 + RELAY_UP_2 (1 s)')
      : 'mirovanje';
  };

  const publish = (payload) => {
    const topic = els('topic').value.trim() || 'barijera/komanda';
    state.topic = topic;
    if (state.client && state.client.connected) {
      state.client.publish(topic, payload);
      log(`MQTT publish → ${topic} : ${payload}`, 'accent');
    } else {
      log(`Lokalna simulacija bez MQTT veze → ${payload}`, 'warn');
    }
  };

  const simulateMove = (target) => {
    if (state.moving) return;
    state.moving = true;
    state.target = target;
    state.barrier = 'MOVING';
    render();
    log(target === 'OPEN'
      ? 'Impuls 1 s: RELAY_DOWN_1 + RELAY_DOWN_2'
      : 'Impuls 1 s: RELAY_UP_1 + RELAY_UP_2', 'accent');

    clearTimeout(state.pulseTimer);
    state.pulseTimer = setTimeout(() => {
      els('relayText').textContent = 'releji otpusteni; cekam 10 s zavrsetak simulacije';
      log('Impuls zavrsio; releji su ponovno otpusteni', 'small');
    }, 1000);

    clearTimeout(state.timer);
    state.timer = setTimeout(() => {
      state.moving = false;
      state.barrier = target;
      render();
      log(`Simulacija zavrsena → stanje ${target}`, 'accent');
    }, 10000);
  };

  const handleCommand = (cmd) => {
    if (cmd === 'RESET_FAULT') { publish(cmd); log('RESET_FAULT poslan'); return; }
    if (state.moving) return;
    if (cmd === 'TOGGLE') cmd = state.barrier === 'CLOSED' ? 'OTVORI' : 'ZATVORI';
    publish(cmd);
    if (cmd === 'OTVORI' && state.barrier === 'CLOSED') simulateMove('OPEN');
    if (cmd === 'ZATVORI' && state.barrier === 'OPEN') simulateMove('CLOSED');
  };

  els('connectBtn').onclick = () => {
    if (!window.mqtt) { log('mqtt.js nije ucitan', 'danger'); return; }
    const url = els('wsUrl').value.trim();
    const username = els('user').value.trim();
    const password = els('pass').value;
    const client = mqtt.connect(url, { username, password, reconnectPeriod: 3000, clean: true });
    state.client = client;
    client.on('connect', () => {
      els('connText').textContent = 'MQTT: spojen';
      log('MQTT spojen', 'accent');
      client.subscribe('barijera/status');
    });
    client.on('message', (topic, payload) => {
      const msg = payload.toString();
      if (topic === 'barijera/status' && ['OPEN','CLOSED','MOVING'].includes(msg)) {
        state.barrier = msg;
        state.moving = msg === 'MOVING';
        render();
        log(`MQTT status ← ${msg}`);
      }
    });
    client.on('error', err => log(`MQTT greska: ${err.message}`, 'danger'));
    client.on('close', () => els('connText').textContent = 'MQTT: nije spojeno');
  };

  els('disconnectBtn').onclick = () => {
    if (state.client) state.client.end(true);
    els('connText').textContent = 'MQTT: nije spojeno';
    log('MQTT prekinut');
  };
  els('mainBtn').onclick = () => handleCommand(state.barrier === 'CLOSED' ? 'OTVORI' : 'ZATVORI');
  els('toggleBtn').onclick = () => handleCommand('TOGGLE');
  els('resetBtn').onclick = () => handleCommand('RESET_FAULT');

  if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  render();
  log('Pocetno stanje: CLOSED. Tipka je postavljena na OTVORI.');
})();
</script>
</body>
</html>
