<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barijera</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Barijera">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.5/mqtt.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --border: #252525; --border2: #333;
  --text: #efefef; --text2: #777; --text3: #444;
  --open: #4ade80; --closed: #60a5fa; --moving: #fbbf24; --error: #f87171;
  --admin: #c084fc;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px; opacity: 0.2; pointer-events: none;
}

/* ── Zajednički stilovi ── */
.card {
  position: relative; z-index: 1;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 32px 28px;
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 16px;
}
.card-title {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text2); text-align: center; font-family: monospace;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); font-family: monospace; }
.field input {
  background: #1e1e1e; border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: monospace; font-size: 13px;
  padding: 11px 14px; outline: none; width: 100%; transition: border-color 0.2s;
}
.field input:focus { border-color: #555; }
.field input::placeholder { color: var(--text3); }

.btn {
  border-radius: 8px; font-family: monospace; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid;
}
.btn-green { background: #1a4a2e; border-color: #22633e; color: var(--open); }
.btn-green:hover { background: #1f5c38; }
.btn-blue { background: #1a2a4a; border-color: #22396e; color: var(--closed); }
.btn-blue:hover { background: #1f3560; }
.btn-purple { background: #2a1a4a; border-color: #6e22a0; color: var(--admin); }
.btn-purple:hover { background: #341f5c; }
.btn-red { background: #4a1a1a; border-color: #8b2222; color: var(--error); }
.btn-red:hover { background: #5c1f1f; }
.btn-ghost { background: transparent; border-color: var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: #555; color: var(--text); }

.err { font-family: monospace; font-size: 11px; color: var(--error); text-align: center; display: none; }
.err.show { display: block; }
.ok { font-family: monospace; font-size: 11px; color: var(--open); text-align: center; display: none; }
.ok.show { display: block; }

/* ── Login ── */
#loginWrap { display: flex; }

/* ── App ── */
#appWrap {
  display: none; flex-direction: column; align-items: center; gap: 0;
  width: 100%; max-width: 360px; position: relative; z-index: 1;
}
.top {
  font-family: monospace; font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 40px; display: flex; align-items: center;
  justify-content: space-between; width: 100%;
}
.top-left { display: flex; align-items: center; gap: 8px; }
.top-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); transition: all 0.3s; }
.top-dot.online { background: var(--open); box-shadow: 0 0 6px var(--open); }
.top-dot.offline { background: var(--error); box-shadow: 0 0 6px var(--error); }
.top-dot.connecting { background: var(--text3); animation: blink 1s ease-in-out infinite; }
.top-actions { display: flex; gap: 12px; }
.top-link { color: var(--text3); cursor: pointer; font-size: 10px; letter-spacing: 0.08em; }
.top-link:hover { color: var(--text2); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main-btn {
  width: 220px; height: 220px; border-radius: 50%;
  border: 1.5px solid var(--border2); background: var(--surface);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  position: relative; transition: border-color 0.3s, transform 0.1s;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.main-btn:hover { border-color: #555; }
.main-btn:active { transform: scale(0.97); }
.main-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.main-btn.state-open   { border-color: var(--open); }
.main-btn.state-closed { border-color: var(--closed); }
.main-btn.state-moving { border-color: var(--moving); animation: pulse-moving 1s ease-in-out infinite; }
@keyframes pulse-moving {
  0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}
  50%{box-shadow:0 0 0 14px rgba(251,191,36,0.07)}
}
@keyframes bounce-up   { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
@keyframes bounce-down { 0%,100%{transform:translateY(0)} 40%{transform:translateY(8px)} }

.progress-ring { position: absolute; inset: -8px; width: calc(100% + 16px); height: calc(100% + 16px); transform: rotate(-90deg); pointer-events: none; }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 2; }
.ring-fg { fill: none; stroke-width: 2; stroke-linecap: round; stroke: var(--open); stroke-dasharray: 0 754; transition: stroke 0.3s; }
.ring-fg.closed { stroke: var(--closed); }
.ring-fg.moving { stroke: var(--moving); }

.arrow { font-size: 72px; line-height: 1; user-select: none; transition: color 0.3s; }
.arrow.open   { color: var(--open); }
.arrow.closed { color: var(--closed); }
.arrow.moving-up   { color: var(--moving); animation: bounce-up 0.8s ease-in-out infinite; }
.arrow.moving-down { color: var(--moving); animation: bounce-down 0.8s ease-in-out infinite; }

.btn-label { font-family: monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; transition: color 0.3s; }
.btn-label.open   { color: var(--open); }
.btn-label.closed { color: var(--closed); }
.btn-label.moving { color: var(--moving); }

.status-area { margin-top: 40px; height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.status-text { font-size: 18px; font-weight: 500; letter-spacing: 0.08em; color: var(--text2); transition: color 0.3s; text-align: center; }
.status-text.open   { color: var(--open); }
.status-text.closed { color: var(--closed); }
.status-text.moving { color: var(--moving); }
.status-note { font-family: monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-align: center; }
.last-action { margin-top: 20px; font-family: monospace; font-size: 10px; color: var(--text3); text-align: center; letter-spacing: 0.06em; }

/* ── Admin ── */
#adminWrap { display: none; }
.admin-header { display: flex; align-items: center; justify-content: space-between; }
.admin-header span { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--admin); font-family: monospace; }
.user-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
.user-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #1e1e1e; border: 1px solid var(--border2); border-radius: 8px;
  padding: 10px 14px; font-family: monospace; font-size: 12px;
}
.user-item .user-name { color: var(--text); }
.user-item .user-role { font-size: 10px; color: var(--text3); margin-left: 8px; }
.user-del { background: none; border: none; color: var(--error); cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0.6; }
.user-del:hover { opacity: 1; }
.divider { border: none; border-top: 1px solid var(--border2); margin: 4px 0; }
.json-output {
  background: #1a1a1a; border: 1px solid var(--border2); border-radius: 8px;
  padding: 12px; font-family: monospace; font-size: 10px; color: var(--text2);
  white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto;
  display: none;
}
.json-output.show { display: block; }
</style>
</head>
<body>

<!-- Login -->
<div class="card" id="loginWrap">
  <div class="card-title">&#128274; Pristup barijeri</div>
  <div class="field">
    <label>Korisničko ime</label>
    <input type="text" id="loginUser" autocomplete="off" autocorrect="off" autocapitalize="none" placeholder="username">
  </div>
  <div class="field">
    <label>Lozinka</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn btn-green" onclick="doLogin()">Prijavi se &rarr;</button>
  <div class="err" id="loginErr">Pogrešno korisničko ime ili lozinka</div>
</div>

<!-- App -->
<div id="appWrap">
  <div class="top">
    <div class="top-left">
      <div class="top-dot connecting" id="topDot"></div>
      <span id="topUser">Barijera</span>
    </div>
    <div class="top-actions">
      <span class="top-link" id="adminLink" onclick="showAdmin()" style="display:none;color:var(--admin)">admin</span>
      <span class="top-link" onclick="doLogout()">odjava</span>
    </div>
  </div>

  <button class="main-btn" id="mainBtn" onclick="handleClick()" disabled>
    <svg class="progress-ring" viewBox="0 0 252 252">
      <circle class="ring-bg" cx="126" cy="126" r="120"/>
      <circle class="ring-fg" id="ringFg" cx="126" cy="126" r="120"/>
    </svg>
    <span class="arrow" id="arrow">&#8593;</span>
    <span class="btn-label" id="btnLabel">spajanje...</span>
  </button>

  <div class="status-area">
    <div class="status-text" id="statusText">čekam status...</div>
    <div class="status-note">Stanje prema zadnjoj naredbi</div>
  </div>
  <div class="last-action" id="lastAction"></div>
</div>

<!-- Admin -->
<div class="card" id="adminWrap">
  <div class="admin-header">
    <span>&#9881; Korisnici</span>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:10px;" onclick="showApp()">&#8592; natrag</button>
  </div>

  <div class="user-list" id="userList"></div>

  <hr class="divider">

  <div style="font-size:10px;color:var(--text3);font-family:monospace;letter-spacing:0.08em;text-transform:uppercase;">Dodaj korisnika</div>
  <div class="field">
    <label>Korisničko ime</label>
    <input type="text" id="newUser" autocomplete="off" autocapitalize="none" placeholder="username">
  </div>
  <div class="field">
    <label>Lozinka</label>
    <input type="password" id="newPass" placeholder="••••••••">
  </div>
  <div style="display:flex;gap:8px;">
    <select id="newRole" style="flex:1;background:#1e1e1e;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:monospace;font-size:12px;padding:11px 14px;outline:none;">
      <option value="user">Korisnik</option>
      <option value="admin">Admin</option>
    </select>
    <button class="btn btn-purple" style="flex:2;" onclick="addUser()">Dodaj</button>
  </div>
  <div class="err" id="adminErr"></div>
  <div class="ok" id="adminOk"></div>

  <hr class="divider">

  <div style="font-size:10px;color:var(--text3);font-family:monospace;letter-spacing:0.08em;text-transform:uppercase;">Spremi na GitHub</div>
  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="ghToken" placeholder="ghp_..." autocomplete="off">
  </div>
  <button class="btn btn-blue" onclick="saveToGithub()">Spremi users.json na GitHub</button>
</div>

<script>
// ── Konfiguracija ─────────────────────────────────────────────────────────────
const EMQX_HOST    = "xf131e86.ala.eu-central-1.emqxsl.com";
const EMQX_PORT    = 8084;
const TOPIC_CMD    = "barijera/komanda";
const TOPIC_STATUS = "barijera/status";

// GitHub raw URL za users.json (promijeni na svoj repozitorij)
const USERS_URL = "https://raw.githubusercontent.com/boriss2808/barijera_esp/main/users.json";

// EMQX account koji svi korisnici dijele
const EMQX_USER = "pwa_barijera";
const EMQX_PASS = "pwa1234";

// Admin lozinka (SHA-256 hash od "adminpass" — promijeni!)
const ADMIN_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

// ── State ─────────────────────────────────────────────────────────────────────
let client = null;
let currentUser = null;
let currentRole = null;
let barrierState = null;
let isMoving = false;
let users = {}; // { username: { hash, role } }

// ── Hash ──────────────────────────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Učitaj korisnike s GitHuba ────────────────────────────────────────────────
async function loadUsers() {
  try {
    const r = await fetch(USERS_URL + '?t=' + Date.now());
    if (r.ok) {
      users = await r.json();
      return true;
    }
  } catch(e) {}
  // Fallback na lokalne korisnike iz localStorage
  const local = localStorage.getItem('barrier_users');
  if (local) { users = JSON.parse(local); return true; }
  return false;
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) return;

  await loadUsers();

  const hash = await sha256(p);

  if (!users[u] || users[u].hash !== hash) {
    document.getElementById('loginErr').classList.add('show');
    return;
  }

  currentUser = u;
  currentRole = users[u].role || 'user';
  localStorage.setItem('barrier_user', u);
  localStorage.setItem('barrier_hash', hash);
  showApp();
  connectMQTT();
}

function doLogout() {
  if (client) client.end();
  localStorage.removeItem('barrier_user');
  localStorage.removeItem('barrier_hash');
  currentUser = null;
  currentRole = null;
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'flex';
  document.getElementById('topUser').textContent = currentUser;
  document.getElementById('adminLink').style.display = currentRole === 'admin' ? 'block' : 'none';
}

function showAdmin() {
  if (currentRole !== 'admin') return;
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'flex';
  renderUserList();
}

// ── Admin ─────────────────────────────────────────────────────────────────────
function renderUserList() {
  const el = document.getElementById('userList');
  el.innerHTML = '';
  for (const [name, data] of Object.entries(users)) {
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `
      <span>
        <span class="user-name">${name}</span>
        <span class="user-role">${data.role || 'user'}</span>
      </span>
      <button class="user-del" onclick="deleteUser('${name}')" title="Obriši">×</button>
    `;
    el.appendChild(div);
  }
}

async function addUser() {
  const u = document.getElementById('newUser').value.trim();
  const p = document.getElementById('newPass').value;
  const r = document.getElementById('newRole').value;
  const errEl = document.getElementById('adminErr');
  const okEl = document.getElementById('adminOk');

  errEl.classList.remove('show');
  okEl.classList.remove('show');

  if (!u || !p) { errEl.textContent = 'Upiši korisničko ime i lozinku'; errEl.classList.add('show'); return; }
  if (users[u]) { errEl.textContent = 'Korisnik već postoji'; errEl.classList.add('show'); return; }

  const hash = await sha256(p);
  users[u] = { hash, role: r };
  localStorage.setItem('barrier_users', JSON.stringify(users));

  document.getElementById('newUser').value = '';
  document.getElementById('newPass').value = '';
  okEl.textContent = `Korisnik "${u}" dodan. Generiraj JSON i spremi na GitHub.`;
  okEl.classList.add('show');
  renderUserList();
}

function deleteUser(name) {
  if (name === currentUser) {
    document.getElementById('adminErr').textContent = 'Ne možeš obrisati sebe!';
    document.getElementById('adminErr').classList.add('show');
    return;
  }
  delete users[name];
  localStorage.setItem('barrier_users', JSON.stringify(users));
  renderUserList();
  document.getElementById('adminOk').textContent = `Korisnik "${name}" obrisan. Generiraj JSON i spremi na GitHub.`;
  document.getElementById('adminOk').classList.add('show');
}

function generateJson() {
  const json = JSON.stringify(users, null, 2);
  const el = document.getElementById('jsonOutput');
  el.textContent = json;
  el.classList.add('show');
  document.getElementById('copyBtn').style.display = 'block';
}

function copyJson() {
  const text = document.getElementById('jsonOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('adminOk').textContent = 'Kopirano! Spremi kao users.json na GitHub.';
    document.getElementById('adminOk').classList.add('show');
  });
}

// ── MQTT ──────────────────────────────────────────────────────────────────────
function connectMQTT() {
  setDot('connecting');
  const clientId = 'pwa_' + Math.random().toString(36).substr(2, 9);

  client = mqtt.connect(`wss://${EMQX_HOST}:${EMQX_PORT}/mqtt`, {
    clientId,
    username: EMQX_USER,
    password: EMQX_PASS,
    clean: true,
    reconnectPeriod: 3000,
    connectTimeout: 10000,
    rejectUnauthorized: false
  });

  client.on('connect', () => {
    setDot('online');
    client.subscribe(TOPIC_STATUS);
  });

  client.on('message', (topic, payload) => {
    if (topic === TOPIC_STATUS) handleStatus(payload.toString());
  });

  client.on('error', () => setDot('offline'));
  client.on('offline', () => setDot('offline'));
  client.on('reconnect', () => setDot('connecting'));
}

function handleStatus(status) {
  barrierState = status;
  updateUI();
}

function handleClick() {
  if (isMoving || !client) return;
  if (barrierState === 'MOVING') return;

  const cmd = barrierState === 'OPEN' ? 'ZATVORI' : 'OTVORI';
  client.publish(TOPIC_CMD, cmd, { qos: 1 });

  const now = new Date();
  const ts = now.toLocaleTimeString('hr-HR', {hour:'2-digit', minute:'2-digit'});
  const ds = now.toLocaleDateString('hr-HR', {day:'2-digit', month:'2-digit'});
  document.getElementById('lastAction').textContent =
    (cmd === 'ZATVORI' ? 'Zatvaranje' : 'Otvaranje') + ' — ' + currentUser + '  ' + ds + ' ' + ts;
}

function updateUI() {
  const btn    = document.getElementById('mainBtn');
  const arrow  = document.getElementById('arrow');
  const label  = document.getElementById('btnLabel');
  const status = document.getElementById('statusText');
  const ring   = document.getElementById('ringFg');

  btn.classList.remove('state-open', 'state-closed', 'state-moving');

  if (barrierState === 'OPEN') {
    btn.classList.add('state-open'); btn.disabled = false;
    arrow.className = 'arrow open'; arrow.textContent = '↑';
    label.className = 'btn-label open'; label.textContent = 'ZATVORI';
    status.className = 'status-text open'; status.textContent = 'BARIJERA JE OTVORENA';
    ring.className = 'ring-fg'; ring.style.strokeDasharray = '0 754';
    isMoving = false;
  } else if (barrierState === 'CLOSED') {
    btn.classList.add('state-closed'); btn.disabled = false;
    arrow.className = 'arrow closed'; arrow.textContent = '↓';
    label.className = 'btn-label closed'; label.textContent = 'OTVORI';
    status.className = 'status-text closed'; status.textContent = 'BARIJERA JE ZATVORENA';
    ring.className = 'ring-fg closed'; ring.style.strokeDasharray = '754 754';
    isMoving = false;
  } else if (barrierState === 'MOVING') {
    btn.classList.add('state-moving'); btn.disabled = true;
    arrow.className = 'arrow moving-up'; arrow.textContent = '↑';
    label.className = 'btn-label moving'; label.textContent = 'LANAC SE PODIŽE';
    status.className = 'status-text moving'; status.textContent = 'U POKRETU...';
    ring.className = 'ring-fg moving';
    isMoving = true;
  }
}

function setDot(state) {
  const d = document.getElementById('topDot');
  d.className = 'top-dot ' + state;
  document.getElementById('mainBtn').disabled = state !== 'online' || barrierState === 'MOVING';
}

// ── Auto-login ────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await loadUsers();
  const u = localStorage.getItem('barrier_user');
  const h = localStorage.getItem('barrier_hash');
  if (u && h && users[u] && users[u].hash === h) {
    currentUser = u;
    currentRole = users[u].role || 'user';
    showApp();
    connectMQTT();
  }
});


async function saveToGithub() {
  const token = document.getElementById('ghToken').value.trim();
  const okEl = document.getElementById('adminOk');
  const errEl = document.getElementById('adminErr');
  okEl.classList.remove('show');
  errEl.classList.remove('show');

  if (!token) {
    errEl.textContent = 'Upiši GitHub token!';
    errEl.classList.add('show');
    return;
  }

  const owner = 'boriss2808';
  const repo  = 'barijera_esp';
  const path  = 'users.json';
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

  // Dohvati SHA trenutne datoteke
  let sha = '';
  try {
    const r = await fetch(apiUrl, { headers: { 'Authorization': 'token ' + token } });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch(e) {}

  const json = JSON.stringify(users, null, 2);
  const content64 = btoa(unescape(encodeURIComponent(json)));

  const body = { message: 'Ažuriraj korisnike', content: content64 };
  if (sha) body.sha = sha;

  try {
    const r = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      okEl.textContent = 'Uspješno spremljeno na GitHub!';
      okEl.classList.add('show');
      document.getElementById('ghToken').value = '';
    } else {
      const d = await r.json();
      errEl.textContent = 'Greška: ' + (d.message || r.status);
      errEl.classList.add('show');
    }
  } catch(e) {
    errEl.textContent = 'Greška pri spajanju na GitHub.';
    errEl.classList.add('show');
  }
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
