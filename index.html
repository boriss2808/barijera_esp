<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barijera App</title>
    <!-- Provjerena MQTT biblioteka s drugog izvora -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: inline-block; width: 85%; max-width: 350px; }
        #status { font-size: 1.2em; margin-bottom: 25px; color: #f1c40f; font-weight: bold; }
        .btn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 22px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; background: #34495e; }
        .btn-active { background: #2ecc71; box-shadow: 0 0 30px rgba(46, 204, 113, 0.4); }
        .btn-down { background: #e74c3c; box-shadow: 0 0 30px rgba(231, 76, 60, 0.4); }
        #debug { margin-top: 20px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚗 BARIJERA</h2>
        <div id="status">POVEZIVANJE...</div>
        <button id="mainBtn" class="btn" onclick="sendAction()">START</button>
        <div id="debug">Sustav se pokreće...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');
        const btnEl = document.getElementById('mainBtn');

        try {
            // --- KONFIGURACIJA ---
            // Shiftr.io zahtijeva wss:// (Secure WebSocket) preko GitHub Pages
            const BROKER = 'wss://esp32esp32.cloud.shiftr.io';
            const OPTIONS = {
                port: 443,
                path: '/mqtt',
                username: 'esp32esp32',
                password: 'Tg7bLYU0Z7d6z78Z',
                clientId: 'web_' + Math.random().toString(16).slice(2, 10),
                connectTimeout: 5000
            };

            debugEl.innerText = "Spajanje na: " + BROKER;
            const client = mqtt.connect(BROKER, OPTIONS);

            client.on('connect', () => {
                statusEl.innerText = "SUSTAV ONLINE";
                statusEl.style.color = "#2ecc71";
                debugEl.innerText = "Povezano na Shiftr.io!";
                client.subscribe('barijera/sensor/status_barijere/state');
            });

            client.on('message', (topic, message) => {
                const msg = message.toString();
                statusEl.innerText = msg;
                if (msg.includes("SPUŠTENA")) {
                    btnEl.className = "btn btn-active";
                    btnEl.innerText = "PODIGNI";
                } else if (msg.includes("PODIGNUTA")) {
                    btnEl.className = "btn btn-down";
                    btnEl.innerText = "SPUSTI";
                }
            });

            client.on('error', (err) => {
                debugEl.innerText = "Greška: " + err;
            });

            window.sendAction = function() {
                if (client.connected) {
                    client.publish('barijera/komanda', 'OTVORI');
                    debugEl.innerText = "Naredba OTVORI poslana!";
                } else {
                    alert("Čekam vezu...");
                }
            };

        } catch (e) {
            debugEl.innerText = "Kritična greška: " + e.message;
        }
    </script>
</body>
</html>
